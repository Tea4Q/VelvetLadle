build:
  name: Create development build
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/setup_node:
        node_version: 18.x
    - eas/cache:
        cache_key_prefix: v1-dependencies
        cache_paths: |
          node_modules
          ~/.npm
          ~/.cache/yarn
    - run:
        name: Install dependencies
        command: npm ci
    - run:
        name: Check TypeScript
        command: npx tsc --noEmit
    - run:
        name: Run linting
        command: npm run lint --if-present
    - run:
        name: Run tests
        command: npm test -- --watchAll=false --passWithNoTests
    - eas/build:
        platform: all
        profile: development
        message: "Development build from workflow"