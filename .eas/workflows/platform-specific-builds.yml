build_android:
  name: Create Android development build
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/setup_node:
        node_version: 18.x
    - eas/cache:
        cache_key_prefix: v1-android-dependencies
        cache_paths: |
          node_modules
          ~/.npm
          ~/.gradle/caches
    - run:
        name: Install dependencies
        command: npm ci
    - run:
        name: Check TypeScript
        command: npx tsc --noEmit
    - run:
        name: Run linting
        command: npm run lint --if-present
    - eas/build:
        platform: android
        profile: development
        message: "Android development build"

