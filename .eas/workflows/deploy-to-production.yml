fingerprint_check:
  name: Check app fingerprint
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/fingerprint

build_or_update_android:
  name: Build or Update Android
  needs: [fingerprint_check]
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/setup_node:
        node_version: 18.x
    - eas/cache:
        cache_key_prefix: v1-deploy-android
        cache_paths: |
          node_modules
          ~/.npm
          ~/.gradle/caches
    - run:
        name: Install dependencies
        command: npm ci
    - run:
        name: Check TypeScript
        command: npx tsc --noEmit
    - run:
        name: Run tests
        command: npm test -- --watchAll=false --passWithNoTests
    - eas/build_or_update:
        platform: android
        profile: production
        channel: production
        message: "Production deployment for Android"

build_or_update_ios:
  name: Build or Update iOS  
  needs: [fingerprint_check]
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/setup_node:
        node_version: 18.x
    - eas/cache:
        cache_key_prefix: v1-deploy-ios
        cache_paths: |
          node_modules
          ~/.npm
          ~/Library/Caches/CocoaPods
    - run:
        name: Install dependencies
        command: npm ci
    - run:
        name: Check TypeScript
        command: npx tsc --noEmit
    - run:
        name: Run tests
        command: npm test -- --watchAll=false --passWithNoTests
    - eas/build_or_update:
        platform: ios
        profile: production
        channel: production
        message: "Production deployment for iOS"

deploy_production:
  name: Deploy to Production
  needs: [build_or_update_android, build_or_update_ios]
  steps:
    - eas/checkout
    - eas/setup_expo:
        expo_version: latest
    - eas/setup_node:
        node_version: 18.x
    - run:
        name: Install dependencies
        command: npm ci
    - run:
        name: Validate production environment
        command: |
          echo "Validating production environment..."
          npx expo config --type=public
    - run:
        name: Run comprehensive tests
        command: npm test -- --watchAll=false --coverage
    - eas/update:
        channel: production
        platform: all
        message: "Production update deployment"